
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baccarat Advisor</title>
</head>
<body>
  <h1>Baccarat Advisor</h1>
  <div id="app">メインアプリケーション</div>

  <!-- Googleログインボタン -->
  <button id="google-login">Googleでログイン</button>

  <!-- Supabaseとログイン処理 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabase = window.supabase.createClient('https://ybqbpxgcycttmcwjiyxq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');

    document.getElementById('google-login').addEventListener('click', async () => {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/index.html' }
      });
      if (error) {
        console.error('ログインエラー:', error.message);
        alert('ログインエラー: ' + error.message);
      } else {
        console.log('ログイン開始:', data);
      }
    });
  </script>
</body>

</html>
