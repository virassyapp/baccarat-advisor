<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Supabase Google Login Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Googleログインテスト</h1>
  <button onclick="loginWithGoogle()">Googleでログイン</button>
  <p id="status">まだログインしていません</p>

  <script>
    // Supabase 接続設定
    const supabase = window.supabase.createClient(
      "https://ybqbxgcycttmcwjyxq.supabase.co", // ← あなたの Supabase プロジェクトURL
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlicWJweGdjeWN0dG1jd2ppeXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MTc2MTcsImV4cCI6MjA3Mjk5MzYxN30.jQwgOe9ZMluJbjlb8tkLHRwPQHgp7mEcPmHL9T0QvYo"               // ← Supabase API 設定画面にある anon public key
    );

    // Googleでログイン
    async function loginWithGoogle() {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "https://virassyapp.github.io/baccarat-advisor/", // ログイン後に戻るURL
        },
      });
      if (error) {
        alert("ログインエラー: " + error.message);
      }
    }

    // ページロード時にログイン状態を確認
    (async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        document.getElementById("status").innerText = `ログイン中: ${user.email}`;
      }
    })();
  </script>
</body>
</html>
